---
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

jobs:
  test:
    name: Test

    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm python python-pip git pciutils

      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt --break-system-packages
          ansible-galaxy install -r requirements.yml

      - name: Display versions
        run: |
          ansible --version
          yamllint --version
          ansible-lint --version

      - name: Run playbook in check mode
        run: |
          ansible-playbook main.yml --check --diff \
            -e "enable_printing=false" \
            -e "enable_bluetooth=false" \
            -e "laptop=false" \
            -e "detect_scanner=false" \
            -e "enable_ufw=false" \
            -e "sunshine=false"